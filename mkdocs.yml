site_name: PSMpy
site_url: https://shotaromo.github.io/PSMpy-doc/
site_description: A Pythonic rebuild of the GAMS PowerSystemModel as a GAMSpy model.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
  icon:
    logo: material/flash-outline

nav:
  - Home: index.md
  - User guide: user_guide.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shotaromo

# The model lives in the (private) PSMpy repo; this is the public docs site only.
repo_url: https://github.com/shotaromo/PSMpy
repo_name: shotaromo/PSMpy
copyright: Shotaro Mori, 2026

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - toc:
      toc_depth: 2
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - footnotes
  - attr_list
  - md_in_html

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

extra_css:
  - https://unpkg.com/katex@0/dist/katex.min.css
  - stylesheets/extra.css

# Standalone docs repo: the bilingual pages use the i18n "suffix" structure
# (index.md / index.ja.md), same as PowerSystemModel-doc.
plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ja
          name: 日本語
          build: true
          nav_translations:
            Home: ホーム
            User guide: ユーザーガイド
